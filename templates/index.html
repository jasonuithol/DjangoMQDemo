<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>platform-service</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --text:#e2e8f0; --muted:#94a3b8;
            --accent:#38bdf8; --amber:#f59e0b; --green:#22c55e; --red:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text);
           font:15px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    .wrap { max-width:1000px; margin:0 auto; padding:32px 20px 64px; }
    header h1 { margin:0 0 4px; font-size:26px; }
    .muted { color:var(--muted); font-weight:400; font-size:13px; }
    .cols { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:24px; }
    @media (max-width:760px){ .cols{ grid-template-columns:1fr; } }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
            padding:18px 20px; margin-bottom:20px; }
    .card h2 { margin:0 0 14px; font-size:16px; }
    label { display:block; margin-bottom:12px; font-size:13px; color:var(--muted); }
    input, textarea { width:100%; margin-top:5px; padding:9px 11px; border-radius:8px;
            border:1px solid var(--line); background:#0b1220; color:var(--text);
            font:inherit; font-size:14px; }
    textarea { resize:vertical; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    button { background:var(--accent); color:#04263a; border:0; border-radius:8px;
            padding:9px 16px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.6; cursor:default; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:8px 6px; border-bottom:1px solid var(--line); font-size:13px; }
    th { color:var(--muted); font-weight:600; }
    td.mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px;
              color:var(--muted); max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .badge { padding:2px 9px; border-radius:999px; font-size:12px; font-weight:600; text-transform:capitalize; }
    .badge-pending { background:rgba(245,158,11,.15); color:var(--amber); }
    .badge-synced  { background:rgba(34,197,94,.15);  color:var(--green); }
    .badge-processed { background:rgba(34,197,94,.15); color:var(--green); }
    .badge-failed  { background:rgba(239,68,68,.15);  color:var(--red); }
    pre { white-space:pre-wrap; word-break:break-word; padding:10px 12px; border-radius:8px;
          font-size:12.5px; margin:12px 0 0; }
    pre.error { background:rgba(239,68,68,.12); color:#fca5a5; }
    pre.ok    { background:rgba(34,197,94,.12);  color:#86efac; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.CSRF_TOKEN = "{{ csrf_token }}";
    window.PARTNER_SECRET = "{{ partner_secret|escapejs }}";
  </script>

  {% verbatim %}
  <script type="module">
    import React, { useState, useEffect, useCallback } from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
    import htm from "https://esm.sh/htm@3.1.1";
    const html = htm.bind(React.createElement);

    const csrf = () => window.CSRF_TOKEN;

    async function getJson(url) {
      const r = await fetch(url, { headers: { Accept: "application/json" } });
      const d = await r.json();
      return d.results || [];
    }
    const getOrders = () => getJson("/api/orders/");
    const getWebhookEvents = () => getJson("/api/webhook-events/");

    function Badge({ status }) {
      return html`<span className=${"badge badge-" + status}>${status}</span>`;
    }

    function OrderForm({ onCreated }) {
      const [name, setName] = useState("");
      const [amount, setAmount] = useState("");
      const [error, setError] = useState(null);
      const [busy, setBusy] = useState(false);

      async function submit(e) {
        e.preventDefault();
        setBusy(true); setError(null);
        const r = await fetch("/api/orders/", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRFToken": csrf() },
          body: JSON.stringify({ customer_name: name, total_amount: amount }),
        });
        setBusy(false);
        if (r.status === 201) { setName(""); setAmount(""); onCreated(); }
        else { setError(await r.json()); }
      }

      return html`
        <form className="card" onSubmit=${submit}>
          <h2>Create an order</h2>
          <label>Customer name
            <input value=${name} onInput=${(e) => setName(e.target.value)} required />
          </label>
          <label>Total amount
            <input value=${amount} onInput=${(e) => setAmount(e.target.value)}
                   placeholder="42.50" required />
          </label>
          <button disabled=${busy}>${busy ? "Creating…" : "Create order"}</button>
          ${error && html`<pre className="error">${JSON.stringify(error, null, 2)}</pre>`}
        </form>`;
    }

    function WebhookPanel({ onSent }) {
      const [secret, setSecret] = useState(window.PARTNER_SECRET);
      const [payload, setPayload] = useState('{\n  "event": "order.updated",\n  "id": "123"\n}');
      const [result, setResult] = useState(null);

      async function send() {
        const r = await fetch("/webhooks/partner/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Partner-Secret": secret,
            "X-CSRFToken": csrf(),
          },
          body: payload,
        });
        setResult({ status: r.status, body: await r.text() });
        if (r.status === 202 && onSent) onSent();
      }

      return html`
        <div className="card">
          <h2>Send a partner webhook</h2>
          <label>Secret header <span className="muted">(change it to see a 401)</span>
            <input value=${secret} onInput=${(e) => setSecret(e.target.value)} />
          </label>
          <label>Payload
            <textarea rows="4" value=${payload}
                      onInput=${(e) => setPayload(e.target.value)}></textarea>
          </label>
          <button onClick=${send}>Send webhook</button>
          ${result && html`<pre className=${result.status < 300 ? "ok" : "error"}>${result.status} · ${result.body}</pre>`}
        </div>`;
    }

    function OrderList({ orders }) {
      return html`
        <div className="card">
          <h2>Orders <span className="muted">— auto-refreshing; watch pending → synced</span></h2>
          ${orders.length === 0
            ? html`<p className="muted">No orders yet.</p>`
            : html`
            <table>
              <thead><tr><th>Customer</th><th>Amount</th><th>Status</th><th>Created</th></tr></thead>
              <tbody>
                ${orders.map((o) => html`
                  <tr key=${o.id}>
                    <td>${o.customer_name}</td>
                    <td>${o.total_amount}</td>
                    <td><${Badge} status=${o.status} /></td>
                    <td className="muted">${new Date(o.created_at).toLocaleTimeString()}</td>
                  </tr>`)}
              </tbody>
            </table>`}
        </div>`;
    }

    function WebhookEventList({ events }) {
      return html`
        <div className="card">
          <h2>Webhook events <span className="muted">— processed asynchronously</span></h2>
          ${events.length === 0
            ? html`<p className="muted">None received yet.</p>`
            : html`
            <table>
              <thead><tr><th>Received</th><th>Status</th><th>Payload</th></tr></thead>
              <tbody>
                ${events.map((ev) => html`
                  <tr key=${ev.id}>
                    <td className="muted">${new Date(ev.received_at).toLocaleTimeString()}</td>
                    <td><${Badge} status=${ev.processed ? "processed" : "pending"} /></td>
                    <td className="mono">${JSON.stringify(ev.payload)}</td>
                  </tr>`)}
              </tbody>
            </table>`}
        </div>`;
    }

    function App() {
      const [orders, setOrders] = useState([]);
      const [events, setEvents] = useState([]);
      const refresh = useCallback(async () => {
        try {
          const [o, e] = await Promise.all([getOrders(), getWebhookEvents()]);
          setOrders(o);
          setEvents(e);
        } catch (err) { /* ignore transient errors */ }
      }, []);
      useEffect(() => {
        refresh();
        const t = setInterval(refresh, 1500);
        return () => clearInterval(t);
      }, [refresh]);

      return html`
        <div className="wrap">
          <header>
            <h1>platform-service</h1>
            <p className="muted">Create an order and watch the Celery worker sync it to the local partner.</p>
          </header>
          <div className="cols">
            <div>
              <${OrderForm} onCreated=${refresh} />
              <${WebhookPanel} onSent=${refresh} />
              <${WebhookEventList} events=${events} />
            </div>
            <${OrderList} orders=${orders} />
          </div>
        </div>`;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
  {% endverbatim %}
</body>
</html>
